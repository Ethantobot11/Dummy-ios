name: Diagnose GameMaker Package Structure

on:
  workflow_dispatch: 

jobs:
  diagnose-package:
    runs-on: macos-latest

    steps:
      - name: Download Official GameMaker Mac Package
        run: |
          echo "Downloading Official GameMaker Mac Package..."
          curl -L "https://gamemaker.io/fr/download/mac/lts/GameMaker.pkg" -o GameMaker.pkg

      - name: Run Native System Installation
        run: |
          echo "=== Performing Root System Install ==="
          sudo installer -pkg GameMaker.pkg -target /

      - name: Complete System Map Scan
        run: |
          echo "=== Listing /Applications Contents ==="
          ls -la /Applications
          
          echo "=== Searching for any App folder containing GameMaker ==="
          find /Applications -maxdepth 2 -name "*GameMaker*"
          
          echo "=== Searching for Igor across the entire disk ==="
          # This scans all likely installation paths to find where the binary landed
          find /Applications /Users/Shared /Library -name "Igor" -type f 2>/dev/null || echo "Igor not found via standard search."
          
          echo "=== Searching for any GameMaker related build tools ==="
          find /Applications -name "*Compiler*" -o -name "*Runner*" 2>/dev/null | head -n 50
